services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voidrunner
      POSTGRES_USER: voidrunner
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voidrunner -d voidrunner"]
      interval: 5s
      timeout: 5s
      retries: 5

  voidrunner:
    build: .
    ports:
      - "8080:8080"
    environment:
      STORAGE_BACKEND: postgres
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: voidrunner
      PG_PASSWORD: password
      PG_DBNAME: voidrunner
      ENABLE_DOCS: ${ENABLE_DOCS:-false}
    depends_on:
      postgres:
        condition: service_healthy
    # Health check removed for distroless compatibility
    # Use external monitoring or container orchestration health checks
    # For local testing, check http://localhost:8080/api/v1/welcome manually

volumes:
  postgres_data: