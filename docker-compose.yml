services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voidrunner
      POSTGRES_USER: voidrunner
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voidrunner -d voidrunner"]
      interval: 5s
      timeout: 5s
      retries: 5

  voidrunner:
    build: .
    ports:
      - "8080:8080"
    environment:
      STORAGE_BACKEND: postgres
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: voidrunner
      PG_PASSWORD: password
      PG_DBNAME: voidrunner
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/welcome"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data: