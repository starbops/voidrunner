name: Pull Request

on:
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_USER: voidrunner
          POSTGRES_DB: voidrunner_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
          
    - name: Download dependencies
      run: go mod download
      
    - name: Install swag CLI
      run: go install github.com/swaggo/swag/cmd/swag@latest
      
    - name: Generate API documentation
      run: make docs-generate
      
    - name: Validate API documentation
      run: make docs-validate
      
    - name: Run unit tests
      run: make test
      
    - name: Run integration tests
      run: go test -v ./test/integration/...
      env:
        TEST_PG_HOST: localhost
        TEST_PG_PORT: 5432
        TEST_PG_USER: voidrunner
        TEST_PG_PASSWORD: password
        TEST_PG_DBNAME: voidrunner_test
      
    - name: Run E2E tests (Memory Backend)
      run: go test -v ./test/e2e/...
      env:
        STORAGE_BACKEND: memory
        
    - name: Run E2E tests (PostgreSQL Backend)
      run: go test -v ./test/e2e/...
      env:
        STORAGE_BACKEND: postgres
        TEST_PG_HOST: localhost
        TEST_PG_PORT: 5432
        TEST_PG_USER: voidrunner
        TEST_PG_PASSWORD: password
        TEST_PG_DBNAME: voidrunner_e2e_test
      
    - name: Build application (sanity check)
      run: make build
      
    - name: Build Docker image (sanity check)
      run: make docker-build
      
    - name: Clean up build artifacts
      run: make clean
      
    - name: Clean up Docker artifacts
      run: make docker-clean