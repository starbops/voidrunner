name: CI

on:
  push:
    branches: [ main ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_USER: voidrunner
          POSTGRES_DB: voidrunner_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
          
    - name: Download dependencies
      run: go mod download
      
    - name: Run unit tests
      run: make test
      
    - name: Run integration tests
      run: go test -v ./test/integration/...
      env:
        TEST_PG_HOST: localhost
        TEST_PG_PORT: 5432
        TEST_PG_USER: voidrunner
        TEST_PG_PASSWORD: password
        TEST_PG_DBNAME: voidrunner_test
      
    - name: Build application
      run: make build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: voidrunner-${{ github.sha }}
        path: bin/voidrunner
        retention-days: 30